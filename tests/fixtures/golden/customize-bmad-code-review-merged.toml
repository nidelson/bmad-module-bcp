# PULSE auto-tracking — track-done hook
#
# This file is generated by `bmad-pulse-setup`.

[workflow]

on_complete = "PULSE auto-tracking: invoke the bmad-pulse-track-done skill, passing the story_id of the just-reviewed story as argument (e.g. /bmad-pulse-track-done 15.3). The skill records end_ts, calculates the AI Leverage Ratio, and displays the Efficiency Pulse. It will interactively prompt for review_cycles and (optionally) effective_hours — wait for the user's response. Pre-requisite: a start_ts must exist in pulse_metrics: for this story (recorded by bmad-dev-story); if absent, the skill warns and suggests running track-start first. BCP auto-recalibrate: após o code review encerrar, verifique se a story tem bcp.total no frontmatter. Se sim, leia o actual_hours da seção pulse_metrics do sprint-status (keyed pelo story_key ou story_id da story). Se actual_hours estiver presente, invoque a skill bmad-bcp-recalibrate passando o caminho da story como argumento e --actual-hours com o valor lido (ex.: /bmad-bcp-recalibrate --story _bmad-output/implementation-artifacts/16-1-mcp-tooling.md --actual-hours 0.48). A recalibração é idempotente — amostras já aplicadas são puladas pelo id da story. Se bcp.total estiver ausente ou actual_hours não for encontrado no sprint-status, pule silenciosamente sem erro."
